# description of this project
description: |-
  Terraform module for creating and managing Google Cloud VPC Subnetworks. This module supports configuring custom CIDR ranges, secondary IP ranges (alias IPs), private Google access, VPC flow logs, and IPv6 configurations.

# How to use this project
usage: |-
  Basic example:
  ```hcl
    module "subnet" {
      source = "[github.com/terraform-gcloud-modules/terraform-gcp-subnet](https://github.com/terraform-gcloud-modules/terraform-gcp-subnet)"

      name        = "basic"
      environment = "test"
      label_order = ["environment", "name"]
      
      project_id  = "your-gcp-project-id"
      network     = "your-vpc-network-name" 
      gcp_region  = "asia-south1"

      subnets = [
        {
          name                     = "main"
          ip_cidr_range            = "10.10.0.0/24"
          region                   = "asia-south1"
          description              = "Basic example subnet"
          private_ip_google_access = true
          stack_type               = "IPV4_ONLY"
          secondary_ip_ranges      = []
          log_config               = null
        }
      ]
    }